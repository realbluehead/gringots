<div class="space-y-6 px-4">
  <div>
    <h2 class="text-2xl font-bold text-dark-text mb-2">Settings</h2>
    <p class="text-dark-muted">
      Gestiona les taules auxiliars del portafoli des d'un únic lloc
    </p>
  </div>

  <div class="bg-dark-card rounded-lg border border-dark-border p-2">
    <div class="flex flex-wrap gap-2">
      <button
        (click)="setTab('isins')"
        class="px-4 py-2 rounded-lg text-sm font-medium transition-colors"
        [ngClass]="
          isTabActive('isins')
            ? 'bg-primary-text text-white'
            : 'text-dark-muted hover:text-dark-text hover:bg-dark-bg'
        "
      >
        ISINs
      </button>

      <button
        (click)="setTab('crypto-addresses')"
        class="px-4 py-2 rounded-lg text-sm font-medium transition-colors"
        [ngClass]="
          isTabActive('crypto-addresses')
            ? 'bg-primary-text text-white'
            : 'text-dark-muted hover:text-dark-text hover:bg-dark-bg'
        "
      >
        Adreces Crypto
      </button>

      <button
        (click)="setTab('policy-ids')"
        class="px-4 py-2 rounded-lg text-sm font-medium transition-colors"
        [ngClass]="
          isTabActive('policy-ids')
            ? 'bg-primary-text text-white'
            : 'text-dark-muted hover:text-dark-text hover:bg-dark-bg'
        "
      >
        Policy IDs
      </button>
    </div>
  </div>

  @if (activeTab === "isins") {
    <app-isins></app-isins>
  }

  @if (activeTab === "crypto-addresses") {
    <app-crypto [mode]="'addresses'"></app-crypto>
  }

  @if (activeTab === "policy-ids") {
    <app-crypto [mode]="'policyIds'"></app-crypto>
  }
</div>
