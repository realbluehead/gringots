<div class="space-y-6 px-4">
  <div class="border-b border-dark-border">
    <nav class="-mb-px flex gap-6">
      @for (tab of tabsConfig; track tab.id) {
        <button
          (click)="setActiveTab(tab.id)"
          [class]="
            activeTab() === tab.id
              ? 'border-b-2 border-primary-text text-primary-text pb-3 text-sm font-semibold'
              : 'border-b-2 border-transparent text-dark-muted hover:text-dark-text pb-3 text-sm font-semibold transition-colors'
          "
        >
          {{ tab.label }}
        </button>
      }
    </nav>
  </div>

  @if (activeTab() === "cashflow") {
    <div class="space-y-4">
      <div
        class="bg-dark-card rounded-lg border border-dark-border p-4 flex flex-wrap items-end gap-4"
      >
        <div>
          <label class="block text-xs font-medium text-dark-muted mb-1"
            >Des de</label
          >
          <input
            type="date"
            [ngModel]="cashflowDateFrom()"
            (ngModelChange)="cashflowDateFrom.set($event)"
            class="px-3 py-2 bg-dark-bg border border-dark-border rounded-lg text-dark-text text-sm focus:outline-none focus:ring-2 focus:ring-primary-text"
          />
        </div>
        <div>
          <label class="block text-xs font-medium text-dark-muted mb-1"
            >Fins a</label
          >
          <input
            type="date"
            [ngModel]="cashflowDateTo()"
            (ngModelChange)="cashflowDateTo.set($event)"
            class="px-3 py-2 bg-dark-bg border border-dark-border rounded-lg text-dark-text text-sm focus:outline-none focus:ring-2 focus:ring-primary-text"
          />
        </div>
        <div>
          <label class="block text-xs font-medium text-dark-muted mb-1"
            >Agrupació</label
          >
          <select
            [ngModel]="cashflowPeriodicity()"
            (ngModelChange)="cashflowPeriodicity.set($event)"
            class="px-3 py-2 bg-dark-bg border border-dark-border rounded-lg text-dark-text text-sm focus:outline-none focus:ring-2 focus:ring-primary-text"
          >
            <option value="diari">Diari</option>
            <option value="setmanal">Setmanal</option>
            <option value="mensual">Mensual</option>
          </select>
        </div>
      </div>
    </div>
  }

  <div
    cdkDropList
    [cdkDropListData]="getActivePanelOrder()"
    (cdkDropListDropped)="dropPanels($event)"
    [ngClass]="
      getActiveTabConfig().maxColumns === 4
        ? 'grid grid-cols-1 lg:grid-cols-4 gap-6'
        : 'grid grid-cols-1 lg:grid-cols-3 gap-6'
    "
  >
    @for (panelId of getActivePanelOrder(); track panelId) {
      <div
        cdkDrag
        class="dashboard-panel cursor-move"
        [style.--panel-span]="getPanelSpan(panelId)"
      >
        <ng-container
          *ngComponentOutlet="
            getPanelComponent(panelId);
            inputs: getPanelInputs(panelId)
          "
        ></ng-container>
      </div>
    }
  </div>
</div>
