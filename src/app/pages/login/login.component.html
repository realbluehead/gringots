<div class="flex min-h-[70vh] items-center justify-center px-4">
  <div
    class="w-full max-w-md rounded-2xl border border-dark-border bg-dark-card p-8 text-center shadow-xl"
  >
    <h2 class="text-2xl font-bold text-dark-text">Inicia sessio</h2>
    <p class="mt-3 text-sm text-dark-muted">
      Accedeix amb el teu compte de Google per continuar a Gringots.
    </p>

    @if (isConfigured) {
      <button
        (click)="loginWithGoogle()"
        class="mt-6 w-full rounded-lg border border-dark-border bg-dark-bg px-4 py-2.5 text-sm font-semibold text-dark-text transition-colors hover:bg-dark-bg/70"
      >
        Continua amb Google
      </button>

      @if (errorMessage) {
        <p class="mt-4 text-left text-sm text-red-300">
          {{ errorMessage }}
        </p>
      }
    } @else {
      <div
        class="mt-8 rounded-lg border border-amber-500/50 bg-amber-500/10 p-4 text-left text-sm text-amber-200"
      >
        Configura el client ID de Google a
        <span class="font-semibold">src/app/config/google-auth.config.ts</span>
        per habilitar el login.
      </div>
    }
  </div>
</div>
